<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 64px;
  display: flex;
  align-items: center;
  font-family: Arial, Helvetica, sans-serif;
}

/* Hidden until we determine CustomerFound */
#addCustomerBtn{
  display: none;
  background: #1976d2;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

#addCustomerBtn:hover{
  background:#1565c0;
}
</style>

</head>

<body>

<button id="addCustomerBtn">
Add New Customer
</button>

<script>

const BUSINESS_CENTRAL_URL =
"https://businesscentral.yourdomain.com/...NEW CUSTOMER URL...";

const btn = document.getElementById("addCustomerBtn");

/* open BC page */
btn.addEventListener("click", () => {
  window.open(BUSINESS_CENTRAL_URL, "_blank");
});

/* helper: normalize boolean values */
function isFalse(value){
  return (
    value === false ||
    value === "false" ||
    value === "False" ||
    value === 0 ||
    value === "0"
  );
}

/* show / hide button */
function updateVisibility(customerFound){
  if (isFalse(customerFound)){
    btn.style.display = "inline-block";
  } else {
    btn.style.display = "none";
  }
}

/* Listen for Webex interaction updates */
window.addEventListener("message", function(event){

  if (!event.data) return;

  const data = event.data;

  console.log("Webex message:", data);

  if (data.type !== "interactionData") return;

  const interaction = data.interaction || {};
  const cad = interaction.callAssociatedData || {};

  const customerFound = cad.CustomerFound;

  console.log("CustomerFound:", customerFound);

  updateVisibility(customerFound);

});

</script>

</body>
</html>
